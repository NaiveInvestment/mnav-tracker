name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'   # 주가·환율 갱신 (실제 실행 간격은 10~20분으로 지연될 수 있음)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch stock quotes and FX
        run: node scripts/fetch-quotes.js
      - name: Fetch price history
        run: node scripts/fetch-history.js
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html quotes.json history.json treasury-history.js _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
